{{/*
Secrets are expected to be created manually or via external secret management.
This template creates placeholder secrets for reference.

Create secrets before installing:
  kubectl create secret generic openctem-api-secrets \
    --from-literal=AUTH_JWT_SECRET=<64-char-secret> \
    --from-literal=APP_ENCRYPTION_KEY=<32-byte-hex> \
    --from-literal=DB_USER=openctem \
    --from-literal=DB_PASSWORD=<db-password> \
    --from-literal=DB_NAME=openctem

  kubectl create secret generic openctem-db-secrets \
    --from-literal=username=openctem \
    --from-literal=password=<db-password>

  kubectl create secret generic openctem-redis-secrets \
    --from-literal=password=<redis-password>
*/}}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openctem.serviceAccountName" . }}
  labels:
    {{- include "openctem.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
